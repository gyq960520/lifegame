<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>lifegame - 玩中取乐系统</title>
    <link rel="icon" href="./assets/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" href="./assets/favicon-32.png" sizes="32x32" />
    <link rel="apple-touch-icon" href="./assets/favicon-180.png" />
    <link rel="stylesheet" href="./styles.css?v=20260702-mobile-hall" />
    <style>
      .brand-lockup img {
        max-width: 64px;
        height: auto;
      }
    </style>
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="brand-lockup">
          <img src="./assets/logo-pixel.png" alt="lifegame logo" />
          <div>
            <p class="eyebrow">lifegame</p>
            <div class="title-row">
              <h1>玩中取乐系统</h1>
              <p>先看清今天怎么玩，再决定怎么提效。</p>
            </div>
            <div id="affairsPersonaList" class="persona-switcher affairs-switcher" aria-label="今日事务人格筛选"></div>
          </div>
        </div>
        <div class="today-chip">
          <button id="returnHomeTop" type="button">返回首页</button>
        </div>
      </header>

      <main class="dashboard">
        <section class="workspace">
          <aside class="persona-rail" aria-label="导航和人格列表">
            <div class="section-title">
              <span id="railTitle">大厅</span>
              <button id="resetPersona" title="回到大厅">大厅</button>
            </div>
            <div id="personaList" class="persona-list"></div>
          </aside>

          <section class="main-stage">
            <div class="section-title">
              <span id="stageTitle">今日事务</span>
            </div>
            <div id="todayView" class="today-view"></div>
            <div id="hallRoomGrid" class="room-grid">
              <section class="room-panel hall-card-action" data-enter-affairs>
                <div class="room-title">
                  <span>今日关卡</span>
                  <strong id="hallAffairsCount">6</strong>
                </div>
                <div class="room-list">
                  <article class="room-item">
                    <strong>进入 6 个人格的今日事务。</strong>
                  </article>
                </div>
              </section>
              <section class="room-panel">
                <div class="room-title">
                  <span>议事厅</span>
                  <strong id="councilCount">0</strong>
                </div>
                <div id="councilList" class="room-list"></div>
              </section>
              <section class="room-panel">
                <div class="room-title">
                  <span>问题之海</span>
                  <strong id="questionCount">0</strong>
                </div>
                <div id="questionList" class="question-list"></div>
              </section>
              <section class="room-panel">
                <div class="room-title">
                  <span>NPC 回声</span>
                  <strong id="npcEchoCount">0</strong>
                </div>
                <div id="npcEchoList" class="room-list"></div>
              </section>
              <section class="room-panel">
                <div class="room-title">
                  <span>思考收纳</span>
                  <strong id="recentEntryCount">0</strong>
                </div>
                <div id="recentEntryList" class="room-list"></div>
              </section>
              <section class="room-panel">
                <div class="room-title">
                  <span>AI 建议回收箱</span>
                  <strong id="suggestionTrashCount">0</strong>
                </div>
                <div id="suggestionTrashList" class="room-list"></div>
              </section>
            </div>
            <div id="affairsRoom" class="persona-room" hidden></div>
            <div id="projectGrid" class="project-grid"></div>
          </section>

          <aside class="insight-panel">
            <div class="section-title">
              <span>思考之地</span>
              <button id="clearDraft" title="清空输入">×</button>
            </div>
            <form id="captureForm" class="capture-form">
              <label>
                人格
                <select id="capturePersona"></select>
              </label>
              <label>
                内容
                <textarea id="captureText" rows="5" placeholder="把和 AI 聊出来的思考、原话、问题或外部影响放这里。分类和记录交给 lifegame。"></textarea>
              </label>
              <button type="submit">放入思考之地</button>
            </form>

            <div class="section-title compact">
              <span>刚整理的思绪</span>
            </div>
            <div id="journalStack" class="journal-stack"></div>
          </aside>
        </section>
      </main>
    </div>

    <script src="./app.js?v=20260701-suggestion-trash"></script>
  </body>
</html>
