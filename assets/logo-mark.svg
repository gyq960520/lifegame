<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-labelledby="title desc">
  <title id="title">lifegame mark</title>
  <desc id="desc">A simple pixel-vector cat-eared game console mascot.</desc>
  <rect width="64" height="64" rx="14" fill="#F9F3DF"/>

  <!-- Main mascot silhouette: cat-eared handheld console. -->
  <path
    d="M14 25 L18 11 L28 21 H36 L46 11 L50 25 C54 29 56 34 56 41 C56 52 46 58 32 58 C18 58 8 52 8 41 C8 34 10 29 14 25 Z"
    fill="#8BD6A1"
    stroke="#24302A"
    stroke-width="4"
    stroke-linejoin="round"
  />

  <!-- Inner screen face. -->
  <rect
    x="17"
    y="25"
    width="30"
    height="21"
    rx="7"
    fill="#F4FFE9"
    stroke="#24302A"
    stroke-width="4"
  />
  <circle cx="27" cy="35" r="3" fill="#24302A"/>
  <circle cx="37" cy="35" r="3" fill="#24302A"/>
  <path
    d="M28 41 C30 44 34 44 36 41"
    fill="none"
    stroke="#24302A"
    stroke-width="3"
    stroke-linecap="round"
  />

  <!-- Minimal controls. -->
  <path d="M18 49 H26" stroke="#F07566" stroke-width="4" stroke-linecap="round"/>
  <path d="M22 45 V53" stroke="#F07566" stroke-width="4" stroke-linecap="round"/>
  <circle cx="44" cy="49" r="4" fill="#F07566" stroke="#24302A" stroke-width="2"/>
  <circle cx="36" cy="52" r="2" fill="#24302A"/>
  <circle cx="31" cy="52" r="2" fill="#24302A"/>
</svg>
